name: Daily Backup

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Backup via Supabase API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: cmnmbikhvdbqgzmtdeko
        run: |
          mkdir -p backups/$(date +%Y-%m-%d)

          # تنزيل النسخة الاحتياطية عبر API مباشرة
          curl -X GET \
            "https://api.supabase.com/v1/projects/${PROJECT_REF}/database/backups" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -o backups/$(date +%Y-%m-%d)/backup_list.json

          # حفظ معلومات المشروع
          curl -X GET \
            "https://api.supabase.com/v1/projects/${PROJECT_REF}" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -o backups/$(date +%Y-%m-%d)/project_info.json

          echo "Backup Date: $(date)" > backups/$(date +%Y-%m-%d)/info.txt
          echo "Status: SUCCESS" >> backups/$(date +%Y-%m-%d)/info.txt
          cat backups/$(date +%Y-%m-%d)/backup_list.json

      - name: Save to GitHub
        run: |
          git config user.email "backup@bot.com"
          git config user.name "Backup Bot"
          git add backups/
          git commit -m "backup: $(date +%Y-%m-%d)" || echo "no changes"
          git push
