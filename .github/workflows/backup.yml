name: Daily Backup

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Login & Backup
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          mkdir -p backups/$(date +%Y-%m-%d)

          supabase db dump \
            --project-id cmnmbikhvdbqgzmtdeko \
            -f backups/$(date +%Y-%m-%d)/backup.sql

          echo "Date: $(date)" > backups/$(date +%Y-%m-%d)/info.txt

      - name: Save to GitHub
        run: |
          git config user.email "backup@bot.com"
          git config user.name "Backup Bot"
          git add backups/
          git commit -m "backup: $(date +%Y-%m-%d)" || echo "no changes"
          git pushname: Daily Backup

