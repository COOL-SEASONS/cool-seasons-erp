name: Daily Backup

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Backup via Supabase API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: cmnmbikhvdbqgzmtdeko
        run: |
          mkdir -p backups/$(date +%Y-%m-%d)

          curl -s -X GET \
            "https://api.supabase.com/v1/projects/${PROJECT_REF}" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -o backups/$(date +%Y-%m-%d)/project_info.json

          curl -s -X GET \
            "https://api.supabase.com/v1/projects/${PROJECT_REF}/database/backups" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -o backups/$(date +%Y-%m-%d)/backups_list.json

          echo "Date: $(date)" > backups/$(date +%Y-%m-%d)/info.txt
          echo "Project: COOL SEASONS ERP" >> backups/$(date +%Y-%m-%d)/info.txt
          echo "Status: SUCCESS ✅" >> backups/$(date +%Y-%m-%d)/info.txt

      - name: Save to GitHub
        run: |
          git config user.email "backup@bot.com"
          git config user.name "Backup Bot"
          git add backups/
          git commit -m "backup: $(date +%Y-%m-%d)" || echo "no changes"
          git push
